<hr>
<h2>Interactive SOE-RBC Simulator</h2>

<p><b>Choose simulation type:</b></p>

<button onclick="runIRF()">Run IRF (Figure 01)</button>
<button onclick="runStochastic()">Run Stochastic Simulation (Figure 02)</button>

<div id="controls" style="margin-top:15px;">
<label>Shock size (TFP):</label>
<input type="range" id="shock" min="0.01" max="2" step="0.01" value="1">
<span id="shock_val">1</span>

<br>

<label>Persistence (ρ):</label>
<input type="range" id="rho" min="0" max="0.99" step="0.01" value="0.9">
<span id="rho_val">0.9</span>
</div>

<div id="plot" style="width:100%;height:600px;"></div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<script>

// Update sliders
document.getElementById("shock").oninput = function() {
    document.getElementById("shock_val").innerText = this.value;
};

document.getElementById("rho").oninput = function() {
    document.getElementById("rho_val").innerText = this.value;
};

// Simple DSGE-like dynamics
function simulate(T, shockSize, rho, stochastic=false) {

    let y = Array(T).fill(0);
    let c = Array(T).fill(0);
    let i = Array(T).fill(0);
    let h = Array(T).fill(0);
    let A = Array(T).fill(0);

    for (let t = 1; t < T; t++) {

        let eps = stochastic ? shockSize * (Math.random()*2-1) : (t===1 ? shockSize : 0);

        A[t] = rho * A[t-1] + eps;

        // Reduced-form relationships (stylized RBC)
        y[t] = 0.8*y[t-1] + 0.5*A[t];
        c[t] = 0.7*c[t-1] + 0.3*y[t];
        i[t] = 0.6*i[t-1] + 0.6*A[t];
        h[t] = 0.5*h[t-1] + 0.4*A[t];
    }

    return {y,c,i,h,A};
}

// FIGURE 01 → IRF
function runIRF() {

    let shock = parseFloat(document.getElementById("shock").value);
    let rho   = parseFloat(document.getElementById("rho").value);

    let data = simulate(40, shock, rho, false);

    plotData(data, "Impulse Response Functions (Figure 01)");
}

// FIGURE 02 → Stochastic simulation
function runStochastic() {

    let shock = parseFloat(document.getElementById("shock").value);
    let rho   = parseFloat(document.getElementById("rho").value);

    let data = simulate(200, shock, rho, true);

    plotData(data, "Stochastic Simulation (Figure 02)");
}

// Plot function
function plotData(data, title) {

    let traces = [
        {y: data.y, name:"Output (y)"},
        {y: data.c, name:"Consumption (c)"},
        {y: data.i, name:"Investment (i)"},
        {y: data.h, name:"Labor (h)"},
        {y: data.A, name:"TFP (A)"}
    ];

    let layout = {
        title: title,
        xaxis: {title:"Time"},
        yaxis: {title:"Deviation from steady state"}
    };

    Plotly.newPlot("plot", traces, layout);
}

</script>
