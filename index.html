<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOE-RBC DSGE (Stable & Full Parameters)</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
body { font-family: Arial; margin: 20px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
</style>
</head>

<body>

<h2>SOE-RBC DSGE Simulator (Stable - 11 Parameters)</h2>

<button onclick="runIRF()">IRF (Figura 01)</button>
<button onclick="runSTOCH()">Stochastic (Figura 02)</button>

<h3>Parameters</h3>
<div class="grid">
<label>σ <input id="sigma" value="2"></label>
<label>δ <input id="delta" value="0.1"></label>
<label>r₀ <input id="r0" value="0.04"></label>
<label>β <input id="beta" value="0.96"></label>
<label>α <input id="alpha" value="0.33"></label>
<label>w <input id="w" value="1"></label>
<label>φ <input id="phi" value="1.5"></label>
<label>Ψ₁ <input id="Psi1" value="0.02"></label>
<label>ρ <input id="rho" value="0.9"></label>
<label>η <input id="eta" value="0.1"></label>
<label>κ <input id="kappa" value="0.2"></label>
</div>

<div id="plot" style="height:850px;"></div>

<script>

function simulate(T, shock, stochastic=false){

let p = {
sigma:+sigma.value,
delta:+delta.value,
r0:+r0.value,
beta:+beta.value,
alpha:+alpha.value,
w:+w.value,
phi:+phi.value,
Psi1:+Psi1.value,
rho:+rho.value,
eta:+eta.value,
kappa:+kappa.value
};

// Estado: [y, c, i, d]
let x = [0,0,0,0];

// Variables
let Y=[],C=[],I=[],H=[],TBY=[],A=[],D=[],CAY=[],K=[],R=[],TB=[],CA=[];

for(let t=0;t<T;t++){
Y.push(0);C.push(0);I.push(0);H.push(0);
TBY.push(0);A.push(0);D.push(0);CAY.push(0);
K.push(0);R.push(0);TB.push(0);CA.push(0);
}

for(let t=1;t<T;t++){

// Shock
let eps = stochastic ? shock*(Math.random()-0.5) : (t==1?shock:0);

// TFP (AR1 estable)
A[t] = p.rho*A[t-1] + eps;

// SISTEMA ESTABLE (clave)
let x_new = [
0.85*x[0] + 0.15*A[t],                 // output
0.85*x[1] + 0.10*x[0],                 // consumo
0.70*x[2] + p.kappa*x[0],              // inversión
(1-p.eta)*x[3] + 0.05*(x[1]+x[2]-x[0]) // deuda anclada
];

x = x_new;

// Variables principales
Y[t] = x[0];
C[t] = x[1];
I[t] = x[2];
D[t] = x[3];

// Capital (estable)
K[t] = (1-p.delta)*K[t-1] + I[t];

// Trabajo
H[t] = (1/p.phi)*Y[t];

// Prima de riesgo (suave)
R[t] = p.r0 + p.Psi1*D[t];

// Trade Balance (suavizado)
TB[t] = 0.8*TB[t-1] + 0.2*(Y[t] - C[t] - I[t]);

// Current Account (sin explosión)
CA[t] = 0.85*CA[t-1] + 0.15*(TB[t] + (R[t]-p.r0)*D[t]);

// Ratios (bien definidos)
TBY[t] = TB[t];
CAY[t] = CA[t];

}

return {Y,C,I,H,TBY,A,D,CAY,K,R,TB,CA};
}

function plot(data,title){

let names=[
"GDP","Consumption","Investment","Labor",
"TB/Y","TFP","Debt","CA/Y",
"Capital","Risk Premium","Trade Balance","Current Account"
];

let keys=Object.keys(data);

let traces=keys.map((k,i)=>({
y:data[k],
name:names[i]
}));

Plotly.newPlot("plot",traces,{
title:title,
xaxis:{title:"Time"},
yaxis:{title:"Deviation from steady state"}
});
}

// IRF (convergente)
function runIRF(){
plot(simulate(10,1,false),"Figura 01 (IRF - Convergent)");
}

// Estocástico (sin picos)
function runSTOCH(){
plot(simulate(500,1,true),"Figura 02 (Stochastic - Stable)");
}

</script>

</body>
</html>
