<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOE-RBC DSGE Simulator (Fully Corrected)</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
body { font-family: Arial; margin: 20px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
</style>
</head>

<body>

<h2>SOE-RBC DSGE Simulator (Stable, No Explosions)</h2>

<button onclick="runIRF()">IRF (Figura 01)</button>
<button onclick="runSTOCH()">Stochastic (Figura 02)</button>

<h3>Parameters</h3>
<div class="grid">
<label>σ <input id="sigma" value="2"></label>
<label>δ <input id="delta" value="0.1"></label>
<label>r₀ <input id="r0" value="0.04"></label>
<label>β <input id="beta" value="0.96"></label>
<label>α <input id="alpha" value="0.33"></label>
<label>w <input id="w" value="1"></label>
<label>φ <input id="phi" value="1.5"></label>
<label>Ψ₁ <input id="Psi1" value="0.01"></label>
<label>ρ <input id="rho" value="0.9"></label>
<label>η <input id="eta" value="0.15"></label>
<label>κ <input id="kappa" value="0.2"></label>
</div>

<div id="plot" style="height:850px;"></div>

<script>

function simulate(T, shock, stochastic=false){

let p = {
sigma:+sigma.value, delta:+delta.value, r0:+r0.value,
beta:+beta.value, alpha:+alpha.value, w:+w.value,
phi:+phi.value, Psi1:+Psi1.value, rho:+rho.value,
eta:+eta.value, kappa:+kappa.value
};

// Variables
let Y=[],C=[],I=[],H=[],TBY=[],A=[],D=[],CAY=[],K=[],R=[],TB=[],CA=[];

// Nivel base (evita divisiones por ~0)
let Y_ss = 1;

for(let t=0;t<T;t++){
Y.push(0);C.push(0);I.push(0);H.push(0);
TBY.push(0);A.push(0);D.push(0);CAY.push(0);
K.push(0);R.push(0);TB.push(0);CA.push(0);
}

for(let t=1;t<T;t++){

let eps = stochastic ? shock*(Math.random()-0.5) : (t==1?shock:0);

// TFP
A[t] = p.rho*A[t-1] + eps;

// Output (estable)
Y[t] = 0.85*Y[t-1] + 0.15*A[t];

// Consumo (suavizado)
C[t] = 0.85*C[t-1] + 0.15*Y[t];

// Inversión
I[t] = 0.7*I[t-1] + p.kappa*(Y[t] - K[t-1]);

// Capital
K[t] = (1-p.delta)*K[t-1] + I[t];

// Trabajo
H[t] = (1/p.phi)*Y[t];

// Deuda fuertemente anclada (clave DSGE)
D[t] = 0.9*D[t-1] + 0.1*(C[t] + I[t] - Y[t]);

// Prima de riesgo
R[t] = p.r0 + p.Psi1*D[t];

// Trade balance (suavizado)
TB[t] = 0.7*TB[t-1] + 0.3*(Y[t] - C[t] - I[t]);

// Current account consistente
CA[t] = TB[t] + (R[t]-p.r0)*D[t];

// Ratios (normalizados correctamente)
TBY[t] = TB[t]/Y_ss;
CAY[t] = CA[t]/Y_ss;

}

return {Y,C,I,H,TBY,A,D,CAY,K,R,TB,CA};
}

function plot(data,title){

let names=[
"GDP","Consumption","Investment","Labor",
"TB/Y","TFP","Debt","CA/Y",
"Capital","Risk Premium","Trade Balance","Current Account"
];

let keys=Object.keys(data);

let traces=keys.map((k,i)=>({
y:data[k],
name:names[i]
}));

Plotly.newPlot("plot",traces,{
title:title,
xaxis:{title:"Time"},
yaxis:{title:"Deviation from steady state"}
});
}

function runIRF(){
plot(simulate(80,1,false),"Figura 01 (IRF - Corrected)");
}

function runSTOCH(){
plot(simulate(200,1,true),"Figura 02 (Stochastic - Corrected)");
}

</script>

</body>
</html>
