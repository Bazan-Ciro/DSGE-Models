<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOE-RBC DSGE (Stable Linear System)</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
body { font-family: Arial; margin: 20px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
</style>
</head>

<body>

<h2>SOE-RBC DSGE Simulator (Stable Linear System)</h2>

<button onclick="runIRF()">IRF (Figura 01)</button>
<button onclick="runSTOCH()">Stochastic (Figura 02)</button>

<h3>Parameters</h3>
<div class="grid">
<label>ρ <input id="rho" value="0.9"></label>
<label>δ <input id="delta" value="0.1"></label>
<label>κ <input id="kappa" value="0.2"></label>
<label>Ψ₁ <input id="Psi1" value="0.02"></label>
</div>

<div id="plot" style="height:850px;"></div>

<script>

function simulate(T, shock, stochastic=false){

let rho = +rho.value;
let delta = +delta.value;
let kappa = +kappa.value;
let Psi1 = +Psi1.value;

// Estado: [y, c, i, d]
let x = [0,0,0,0];

// Variables
let Y=[],C=[],I=[],H=[],TBY=[],A=[],D=[],CAY=[],K=[],R=[],TB=[],CA=[];

for(let t=0;t<T;t++){
Y.push(0);C.push(0);I.push(0);H.push(0);
TBY.push(0);A.push(0);D.push(0);CAY.push(0);
K.push(0);R.push(0);TB.push(0);CA.push(0);
}

for(let t=1;t<T;t++){

let eps = stochastic ? shock*(Math.random()-0.5) : (t==1?shock:0);

// Shock AR(1)
A[t] = rho*A[t-1] + eps;

// MATRIZ ESTABLE (clave)
let x_new = [
0.8*x[0] + 0.2*A[t],
0.7*x[1] + 0.2*x[0],
0.6*x[2] + kappa*x[0],
0.85*x[3] + 0.1*(x[1] + x[2] - x[0])
];

x = x_new;

// Variables principales
Y[t] = x[0];
C[t] = x[1];
I[t] = x[2];
D[t] = x[3];

// Capital
K[t] = (1-delta)*K[t-1] + I[t];

// Trabajo
H[t] = 0.5*Y[t];

// Risk premium
R[t] = Psi1*D[t];

// Trade balance
TB[t] = Y[t] - C[t] - I[t];

// Current account
CA[t] = TB[t] + R[t]*D[t];

// Ratios (SIN explosiones)
TBY[t] = TB[t];
CAY[t] = CA[t];

}

return {Y,C,I,H,TBY,A,D,CAY,K,R,TB,CA};
}

function plot(data,title){

let names=[
"GDP","Consumption","Investment","Labor",
"TB/Y","TFP","Debt","CA/Y",
"Capital","Risk Premium","Trade Balance","Current Account"
];

let keys=Object.keys(data);

let traces=keys.map((k,i)=>({
y:data[k],
name:names[i]
}));

Plotly.newPlot("plot",traces,{
title:title,
xaxis:{title:"Time"},
yaxis:{title:"Deviation from steady state"}
});
}

function runIRF(){
plot(simulate(10,1,false),"Figura 01 (IRF - Stable)");
}

function runSTOCH(){
plot(simulate(500,1,true),"Figura 02 (Stochastic - Stable)");
}

</script>

</body>
</html>
