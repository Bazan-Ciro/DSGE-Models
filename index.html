<hr>
<h2>SOE-RBC Interactive Simulator (Extended Parameters)</h2>

<button onclick="runIRF()">Run IRF</button>
<button onclick="runStochastic()">Run Stochastic</button>

<h3>Parameters</h3>

<div id="controls">

σ <input type="number" id="sigma" value="2" step="0.1"><br>
δ <input type="number" id="delta" value="0.1" step="0.01"><br>
r0 <input type="number" id="r0" value="0.04" step="0.01"><br>
β <input type="number" id="beta" value="0.96" step="0.01"><br>
α <input type="number" id="alpha" value="0.33" step="0.01"><br>
w <input type="number" id="w" value="1" step="0.1"><br>
φ <input type="number" id="phi" value="1" step="0.1"><br>
Ψ1 <input type="number" id="psi1" value="0.01" step="0.01"><br>
ρ <input type="number" id="rho" value="0.9" step="0.01"><br>
η <input type="number" id="eta" value="0.1" step="0.01"><br>
κ <input type="number" id="kappa" value="0.2" step="0.01"><br>

Shock <input type="number" id="shock" value="1" step="0.1"><br>

</div>

<div id="plot" style="width:100%;height:600px;"></div>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<script>

function getParams(){
    return {
        sigma: parseFloat(sigma.value),
        delta: parseFloat(delta.value),
        r0: parseFloat(r0.value),
        beta: parseFloat(beta.value),
        alpha: parseFloat(alpha.value),
        w: parseFloat(w.value),
        phi: parseFloat(phi.value),
        psi1: parseFloat(psi1.value),
        rho: parseFloat(rho.value),
        eta: parseFloat(eta.value),
        kappa: parseFloat(kappa.value),
        shock: parseFloat(shock.value)
    };
}

function simulate(T, stochastic=false){

    let p = getParams();

    let y=[], c=[], i=[], h=[], k=[], d=[], A=[];
    
    for(let t=0;t<T;t++){
        y.push(0); c.push(0); i.push(0);
        h.push(0); k.push(1); d.push(0); A.push(0);
    }

    for(let t=1;t<T;t++){

        let eps = stochastic ? p.shock*(Math.random()*2-1) : (t===1 ? p.shock : 0);

        // TFP
        A[t] = p.rho*A[t-1] + eps;

        // Capital accumulation
        k[t] = (1-p.delta)*k[t-1] + i[t-1];

        // Production (log-linear approx)
        y[t] = p.alpha*k[t-1] + (1-p.alpha)*h[t-1] + A[t];

        // Consumption (Euler approx)
        c[t] = c[t-1] + (1/p.sigma)*(p.r0 - p.beta*(y[t]-y[t-1]));

        // Investment
        i[t] = p.kappa*(y[t] - c[t]) - p.delta*k[t-1];

        // Labor supply
        h[t] = (1/p.phi)*(p.w - c[t]);

        // Debt dynamics
        d[t] = d[t-1] + p.eta*(c[t] + i[t] - y[t]) + p.psi1*d[t-1];
    }

    return {y,c,i,h,k,d,A};
}

function plot(data, title){

    let traces = [
        {y:data.y, name:"Output"},
        {y:data.c, name:"Consumption"},
        {y:data.i, name:"Investment"},
        {y:data.h, name:"Labor"},
        {y:data.k, name:"Capital"},
        {y:data.d, name:"Debt"},
        {y:data.A, name:"TFP"}
    ];

    Plotly.newPlot("plot", traces, {
        title: title,
        xaxis:{title:"Time"},
        yaxis:{title:"Deviation"}
    });
}

function runIRF(){
    let data = simulate(50,false);
    plot(data,"Impulse Response Functions");
}

function runStochastic(){
    let data = simulate(200,true);
    plot(data,"Stochastic Simulation");
}

</script>
