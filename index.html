<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOE-RBC DSGE Simulator</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
body { font-family: Arial; margin: 20px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
</style>
</head>

<body>

<h2>SOE-RBC Interactive Simulator</h2>

<button onclick="runIRF()">IRF (Figure 01)</button>
<button onclick="runSTOCH()">Stochastic (Figure 02)</button>

<h3>Parameters</h3>

<div class="grid">
<label>sigma <input type="number" id="sigma" value="2"></label>
<label>delta <input type="number" id="delta" value="0.1"></label>
<label>r0 <input type="number" id="r0" value="0.04"></label>
<label>beta <input type="number" id="beta" value="0.96"></label>
<label>alpha <input type="number" id="alpha" value="0.33"></label>
<label>w <input type="number" id="w" value="1"></label>
<label>phi <input type="number" id="phi" value="1.5"></label>
<label>Psi1 <input type="number" id="Psi1" value="0.01"></label>
<label>rho <input type="number" id="rho" value="0.9"></label>
<label>eta <input type="number" id="eta" value="0.01"></label>
<label>kappa <input type="number" id="kappa" value="0.1"></label>
</div>

<div id="plot" style="height:800px;"></div>

<script>

function simulate(T, shock, stochastic=false){

let p = {
sigma: parseFloat(sigma.value),
delta: parseFloat(delta.value),
r0: parseFloat(r0.value),
beta: parseFloat(beta.value),
alpha: parseFloat(alpha.value),
w: parseFloat(w.value),
phi: parseFloat(phi.value),
Psi1: parseFloat(Psi1.value),
rho: parseFloat(rho.value),
eta: parseFloat(eta.value),
kappa: parseFloat(kappa.value)
};

// Variables
let Y=[], C=[], I=[], H=[], TB_Y=[], A=[], D=[], CA_Y=[], K=[], R=[], TB=[], CA[];

for(let t=0;t<T;t++){
Y.push(0);C.push(0);I.push(0);H.push(0);
TB_Y.push(0);A.push(0);D.push(0);CA_Y.push(0);
K.push(0);R.push(0);TB.push(0);CA.push(0);
}

for(let t=1;t<T;t++){

let eps = stochastic ? shock*(Math.random()-0.5) : (t==1?shock:0);

A[t] = p.rho*A[t-1] + eps;

// Producción
Y[t] = p.alpha*K[t-1] + (1-p.alpha)*H[t] + A[t];

// Consumo (Euler simplificado)
C[t] = C[t-1] + (1/p.sigma)*(p.r0 - p.beta);

// Inversión
I[t] = p.delta*K[t-1] + p.kappa*(A[t]);

// Capital
K[t] = (1-p.delta)*K[t-1] + I[t];

// Trabajo
H[t] = (1/p.phi)*(Y[t] - C[t]);

// Prima de riesgo
R[t] = p.r0 + p.Psi1*(Math.exp(D[t-1]) - 1);

// Deuda externa
D[t] = D[t-1] + R[t]*D[t-1] + C[t] + I[t] - Y[t];

// Trade balance
TB[t] = Y[t] - C[t] - I[t];

// Current account
CA[t] = TB[t] + R[t]*D[t-1];

// Ratios
TB_Y[t] = TB[t]/(Y[t]||1);
CA_Y[t] = CA[t]/(Y[t]||1);

}

return {Y,C,I,H,TB_Y,A,D,CA_Y,K,R,TB,CA};
}

function plotAll(data,title){

let names = [
"GDP","Consumption","Investment","Labor",
"TB/Y","TFP","Debt","CA/Y",
"Capital","Risk Premium","Trade Balance","Current Account"
];

let keys = Object.keys(data);

let traces = keys.map((k,i)=>({
y:data[k],
name:names[i]
}));

Plotly.newPlot("plot",traces,{title:title});
}

function runIRF(){
let data = simulate(60,1,false);
plotAll(data,"IRF - Figure 01");
}

function runSTOCH(){
let data = simulate(200,1,true);
plotAll(data,"Stochastic Simulation - Figure 02");
}

</script>

</body>
</html>
