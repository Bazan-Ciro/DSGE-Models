<script>

function simulate(T, shock, stochastic=false){

let p = {
sigma: +document.getElementById("sigma").value,
delta: +document.getElementById("delta").value,
r0: +document.getElementById("r0").value,
beta: +document.getElementById("beta").value,
alpha: +document.getElementById("alpha").value,
phi: +document.getElementById("phi").value,
Psi1: +document.getElementById("Psi1").value,
rho: +document.getElementById("rho").value,
kappa: +document.getElementById("kappa").value
};

// Variables
let Y=[],C=[],I=[],H=[],TBY=[],A=[],D=[],CAY=[],K=[],R=[],TB=[],CA=[];

for(let t=0;t<T;t++){
Y.push(0);C.push(0);I.push(0);H.push(0);
TBY.push(0);A.push(0);D.push(0);CAY.push(0);
K.push(0);R.push(0);TB.push(0);CA.push(0);
}

for(let t=1;t<T;t++){

// Shock
let eps = stochastic ? shock*(Math.random()-0.5) : (t===1 ? shock : 0);

// TFP (AR1 estable)
A[t] = p.rho*A[t-1] + eps;

// Capital (estable)
K[t] = (1 - p.delta)*K[t-1] + p.kappa*A[t];

// Producción (log-linear)
Y[t] = p.alpha*K[t] + A[t];

// Consumo (suavizado y estable)
C[t] = 0.9*C[t-1] + 0.1*Y[t];

// Trabajo (estacionario)
H[t] = (1/p.phi)*A[t];

// Prima de riesgo (estabiliza deuda)
R[t] = p.r0 + p.Psi1*D[t-1];

// Deuda (con penalización → converge)
D[t] = 0.9*D[t-1] + (C[t] + I[t] - Y[t]);

// Inversión consistente
I[t] = K[t] - (1 - p.delta)*K[t-1];

// Trade balance
TB[t] = Y[t] - C[t] - I[t];

// Current account
CA[t] = TB[t] + R[t]*D[t-1];

// Ratios
TBY[t] = TB[t]/(Y[t] || 1);
CAY[t] = CA[t]/(Y[t] || 1);

}

return {Y,C,I,H,TBY,A,D,CAY,K,R,TB,CA};
}

</script>
