<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOE-RBC DSGE Simulator (Stable)</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
body { font-family: Arial; margin: 20px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
</style>
</head>

<body>

<h2>SOE-RBC DSGE Simulator (Stable & Convergent)</h2>

<button onclick="runIRF()">IRF (Figura 01)</button>
<button onclick="runSTOCH()">Stochastic (Figura 02)</button>

<h3>Parameters</h3>
<div class="grid">
<label>σ <input id="sigma" value="2"></label>
<label>δ <input id="delta" value="0.1"></label>
<label>r₀ <input id="r0" value="0.04"></label>
<label>β <input id="beta" value="0.96"></label>
<label>α <input id="alpha" value="0.33"></label>
<label>w <input id="w" value="1"></label>
<label>φ <input id="phi" value="1.5"></label>
<label>Ψ₁ <input id="Psi1" value="0.01"></label>
<label>ρ <input id="rho" value="0.9"></label>
<label>η <input id="eta" value="0.05"></label>
<label>κ <input id="kappa" value="0.2"></label>
</div>

<div id="plot" style="height:850px;"></div>

<script>

function simulate(T, shock, stochastic=false){

let p = {
sigma: +sigma.value,
delta: +delta.value,
r0: +r0.value,
beta: +beta.value,
alpha: +alpha.value,
w: +w.value,
phi: +phi.value,
Psi1: +Psi1.value,
rho: +rho.value,
eta: +eta.value,
kappa: +kappa.value
};

// Variables (estado estacionario = 0)
let Y=[],C=[],I=[],H=[],TBY=[],A=[],D=[],CAY=[],K=[],R=[],TB=[],CA=[];

for(let t=0;t<T;t++){
Y.push(0);C.push(0);I.push(0);H.push(0);
TBY.push(0);A.push(0);D.push(0);CAY.push(0);
K.push(0);R.push(0);TB.push(0);CA.push(0);
}

for(let t=1;t<T;t++){

// Shock
let eps = stochastic ? shock*(Math.random()-0.5) : (t==1?shock:0);

// TFP (AR1 estable)
A[t] = p.rho*A[t-1] + eps;

// Output (mean reverting)
Y[t] = 0.7*Y[t-1] + 0.3*A[t];

// Consumo (suavizado)
C[t] = 0.8*C[t-1] + 0.2*Y[t];

// Inversión
I[t] = 0.6*I[t-1] + p.kappa*(Y[t] - K[t-1]);

// Capital
K[t] = (1-p.delta)*K[t-1] + I[t];

// Trabajo
H[t] = (1/p.phi)*Y[t];

// Prima de riesgo (estable)
R[t] = p.r0 + p.Psi1*D[t-1];

// Deuda (mean reverting con ajuste η)
D[t] = (1-p.eta)*D[t-1] + (C[t] + I[t] - Y[t]);

// Trade Balance
TB[t] = Y[t] - C[t] - I[t];

// Current Account
CA[t] = TB[t] + R[t]*D[t-1];

// Ratios
TBY[t] = TB[t]/(Y[t] || 1);
CAY[t] = CA[t]/(Y[t] || 1);

}

return {Y,C,I,H,TBY,A,D,CAY,K,R,TB,CA};
}

function plot(data,title){

let names=[
"GDP","Consumption","Investment","Labor",
"TB/Y","TFP","Debt","CA/Y",
"Capital","Risk Premium","Trade Balance","Current Account"
];

let keys=Object.keys(data);

let traces=keys.map((k,i)=>({
y:data[k],
name:names[i]
}));

Plotly.newPlot("plot",traces,{
title:title,
xaxis:{title:"Time"},
yaxis:{title:"Deviation from steady state"}
});
}

function runIRF(){
plot(simulate(80,1,false),"Figura 01 (IRF - Convergent)");
}

function runSTOCH(){
plot(simulate(200,1,true),"Figura 02 (Stochastic)");
}

</script>

</body>
</html>
